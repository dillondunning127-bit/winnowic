<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="/assets/Logo-Small.png">
  <title>Winnowic Auth</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <script defer src="/_vercel/insights/script.js"></script>
   <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
   <meta name="description" content="Free SAT Math diagnostic, personalized study plan, and daily practice questions. Get your predicted score range and find your weak areas in 15 minutes — no account required.">
<meta name="keywords" content="SAT math practice, free SAT diagnostic, SAT math study plan, SAT math questions, SAT math prep">
<meta property="og:title" content="Winnowic — Free SAT Math Diagnostic & Study Plan">
<meta property="og:description" content="Take a free 20-question SAT Math diagnostic. Get your predicted score range, a personalized week-by-week study plan, and daily practice questions targeting your weakest units.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.winnowic.com">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Winnowic — Free SAT Math Diagnostic & Study Plan">
<meta name="twitter:description" content="Free SAT Math diagnostic. Predicted score range. Personalized study plan. Daily practice questions. No account required.">
<link rel="canonical" href="https://www.winnowic.com">
</head>

<body>

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-tabs">
            <button id="login-tab">Login</button>
            <button id="signup-tab">Create Account</button>
        </div>

        <h2 id="auth-title">Welcome Back</h2>

        <input type="email" id="auth-email" placeholder="Email">

        <input type="password" id="auth-password" placeholder="Password">

        <p id="forgot-password-link">Forgot Password?</p>

        <button id="auth-submit-btn">
            Login
        </button>

        <p id="auth-message"></p>

    </div>

</div>

<script type="module" src="./js/auth.js"></script>
<script>
    // Initialize Lucide icons after DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    });
</script>

</body>
</html>
